<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amebo AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1 class="logo">Amebo AI</h1>
        <div id="reading-time" class="reading-time"></div>
      </div>
      <div id="page-title" class="page-title">Loading page info...</div>
    </header>

    <main>
      <div id="initial-state" class="content-view">
        <p class="description">Get a 3-point summary of any page in seconds.</p>
        <button id="summarizeBtn" class="primary-btn">Summarize Page</button>
      </div>

      <div id="loading" class="loading-view hidden">
        <div class="spinner"></div>
        <p>Analyzing content...</p>
      </div>

      <div id="result-state" class="result-view hidden">
        <div class="summary-label">Summary</div>
        <div id="summary-output" class="summary-content"></div>
        <div class="actions">
          <button id="copyBtn" class="secondary-btn">Copy</button>
          <button id="resetBtn" class="text-btn">Reset</button>
        </div>
      </div>
    </main>

    <footer>
      <p>Powered by Amebo AI & Groq</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
