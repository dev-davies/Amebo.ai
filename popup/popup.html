<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amebo AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1 class="logo">Amebo AI</h1>
        <div id="reading-time" class="reading-time"></div>
      </div>
      <div id="page-title" class="page-title">Loading page info...</div>
    </header>

    <main>
      <div id="initial-state" class="content-view">
        <p class="description">Get a structured summary of any page in seconds.</p>
        <div class="length-row">
          <label for="lengthSelect" class="length-label">Length</label>
          <select id="lengthSelect" class="length-select" aria-label="Summary length">
            <option value="3">3 bullets</option>
            <option value="5" selected>5 bullets</option>
            <option value="detailed">Detailed</option>
          </select>
        </div>
        <button id="summarizeBtn" class="primary-btn">Summarize Page</button>
      </div>

      <div id="loading" class="loading-view hidden">
        <div class="spinner"></div>
        <p>Analyzing content...</p>
      </div>

      <div id="warning-banner" class="warning-banner hidden" role="status" aria-live="polite"></div>
      <div id="error-banner" class="error-banner hidden" role="alert" aria-live="polite"></div>

      <div id="result-state" class="result-view">
        <div class="summary-label">Summary</div>
        <div id="summary-output" class="summary-content">
          <p class="placeholder-text">Click the button above to generate your 3-point summary!</p>
        </div>
        <div id="result-meta" class="result-meta hidden">
          <span id="word-count" class="meta-chip"></span>
          <span id="reading-time-body" class="meta-chip"></span>
        </div>
        <div id="result-actions" class="actions hidden">
          <button id="highlightBtn" class="secondary-btn">Highlight</button>
          <button id="copyBtn" class="secondary-btn">Copy</button>
          <button id="resetBtn" class="text-btn">Reset</button>
        </div>
      </div>
    </main>

    <footer>
      <p>Powered by Amebo AI & Groq</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
